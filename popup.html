<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 14px;
    }
    h2 { font-size: 14px; font-weight: 700; color: #f0b90b; margin-bottom: 12px; }
    .status-box {
      background: #1e2130; border: 1px solid #2d3748;
      border-radius: 8px; padding: 10px 12px;
      margin-bottom: 12px; font-size: 12px;
    }
    .status-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .status-row:last-child { margin-bottom: 0; }
    .s-label { color: #64748b; }
    .s-val { font-weight: 600; }
    .green { color: #22c55e; }
    .yellow { color: #f0b90b; }
    .red { color: #ef4444; }
    .progress-wrap { background: #2d3748; border-radius: 4px; height: 5px; margin: 8px 0 3px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #f0b90b, #ff9500); border-radius: 4px; width: 0%; transition: width 0.4s; }
    .progress-pct { font-size: 10px; color: #64748b; text-align: right; }
    .field { margin-bottom: 10px; }
    label { display: block; font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
    input[type="number"] {
      width: 100%; background: #1e2130; border: 1px solid #2d3748;
      border-radius: 6px; color: #e2e8f0; padding: 7px 10px;
      font-size: 13px; outline: none;
    }
    input:focus { border-color: #f0b90b; }
    .row { display: flex; gap: 8px; }
    .row .field { flex: 1; }
    hr { border: none; border-top: 1px solid #2d3748; margin: 10px 0; }
    .btn {
      width: 100%; padding: 9px; border: none; border-radius: 7px;
      font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 7px;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-start { background: linear-gradient(135deg, #f0b90b, #ff9500); color: #000; }
    .btn-stop  { background: #ef4444; color: #fff; display: none; }
    .log {
      background: #0a0d14; border: 1px solid #1e2130;
      border-radius: 6px; padding: 7px;
      height: 110px; overflow-y: auto;
      font-size: 10px; font-family: 'Menlo', monospace; color: #64748b;
    }
    .l-ok   { color: #22c55e; }
    .l-err  { color: #ef4444; }
    .l-info { color: #60a5fa; }
    .l-warn { color: #f0b90b; }
    .hint { font-size: 10px; color: #475569; margin-top: 4px; }
  </style>
</head>
<body>

<h2>&#9889; Gate Volume Trader</h2>

<div class="status-box">
  <div class="status-row">
    <span class="s-label">&#1054;&#1073;&#1098;&#1105;&#1084; &#1085;&#1072;&#1090;&#1086;&#1088;&#1075;&#1086;&#1074;&#1072;&#1085;&#1086;</span>
    <span class="s-val yellow" id="st-done">$0.00</span>
  </div>
  <div class="status-row">
    <span class="s-label">&#1062;&#1077;&#1083;&#1100;</span>
    <span class="s-val" id="st-target">&#8212;</span>
  </div>
  <div class="status-row">
    <span class="s-label">&#1062;&#1080;&#1082;&#1083;&#1086;&#1074;</span>
    <span class="s-val" id="st-cycles">0</span>
  </div>
  <div class="status-row">
    <span class="s-label">&#1057;&#1090;&#1072;&#1090;&#1091;&#1089;</span>
    <span class="s-val" id="st-status">&#1054;&#1078;&#1080;&#1076;&#1072;&#1085;&#1080;&#1077;</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="progress-pct" id="progress-pct">0%</div>
</div>

<div class="row">
  <div class="field">
    <label>&#1062;&#1077;&#1083;&#1100; &#1086;&#1073;&#1098;&#1105;&#1084;&#1072; ($)</label>
    <input type="number" id="inp-target" value="100" min="1" step="1" />
  </div>
  <div class="field">
    <label>&#1057;&#1091;&#1084;&#1084;&#1072; &#1085;&#1072; &#1094;&#1080;&#1082;&#1083; ($)</label>
    <input type="number" id="inp-amount" value="4" min="1" step="0.5" />
  </div>
</div>

<p class="hint">* 1 &#1094;&#1080;&#1082;&#1083; = Buy + Sell &#8594; &#1086;&#1073;&#1098;&#1105;&#1084; +$&#1089;&#1091;&#1084;&#1084;&#1072;&#215;2</p>

<hr />

<button class="btn btn-start" id="btn-start">&#9654; &#1047;&#1072;&#1087;&#1091;&#1089;&#1090;&#1080;&#1090;&#1100;</button>
<button class="btn btn-stop"  id="btn-stop">&#9209; &#1054;&#1089;&#1090;&#1072;&#1085;&#1086;&#1074;&#1080;&#1090;&#1100;</button>

<div class="log" id="log"></div>

<script src="popup.js"></script>
</body>
</html>
